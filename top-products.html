<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Top Products</title>
  <style>
    /* Reset */
    body, h2, div {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Section styling */
    .top-products-section {
      background: #f4f4f7; /* very light neutral grey */
      padding: 60px 40px;
      text-align: center;
    }

    .top-products-section h2 {
      font-size: 2.2em;
      margin-bottom: 40px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: #333;
    }

    /* Product grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px; /* strict 1px spacing between boxes */
    }

    .product-box {
      background: #ffffff;
      border: 2px solid #444; /* darker outline */
      text-align: center;
      padding: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .product-box img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      margin-bottom: 15px;
    }

    .product-box h3 {
      font-size: 1.2em;
      margin-bottom: 10px;
      color: #222;
      font-family: Arial, sans-serif;
    }

    .product-box p {
      font-size: 0.95em;
      color: #555;
      margin-bottom: 15px;
    }

    .product-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <section class="top-products-section">
    <h2>Top Products</h2>
    <div class="products-grid">
      
      <!-- Product 1 -->
      <div class="product-box">
        <img src="images/Angle_grinder.png" alt="Angle Grinder">
        <h3>Angle Grinder</h3>
        <p>Durable and powerful tool for cutting and grinding.</p>
      </div>

      <!-- Product 2 -->
      <div class="product-box">
        <img src="images/Electric_drill550.png" alt="Electric Drill">
        <h3>Electric Drill</h3>
        <p>Reliable drill with multiple speed settings.</p>
      </div>

      <!-- Product 3 -->
      <div class="product-box">
        <img src="images/Foot_pump1.png" alt="Foot Pump">
        <h3>Foot Pump</h3>
        <p>Compact and efficient pump for inflating tires.</p>
      </div>

      <!-- Product 4 -->
      <div class="product-box">
        <img src="images/Household_item.png" alt="Household Item">
        <h3>Household Item</h3>
        <p>Essential everyday product for home use.</p>
      </div>

    </div>
  </section>

</body>
</html>
